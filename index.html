<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="description" content="一款可以在 PC 和手机浏览器中游玩的合成大西瓜小游戏。">
<meta name="theme-color" content="#eadbbd">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="合成大西瓜">
<meta property="og:title" content="合成大西瓜">
<meta property="og:description" content="点开就能玩的网页小游戏，支持手机和电脑浏览器。">
<meta property="og:type" content="website">
<title>合成大西瓜</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;height:100%;min-height:100%;background:#eadbbd;font-family:"Microsoft YaHei","Segoe UI",sans-serif;overflow:hidden;overscroll-behavior:none;position:fixed;inset:0;width:100%}body{display:grid;place-items:center;padding:max(8px,env(safe-area-inset-top)) max(8px,env(safe-area-inset-right)) max(8px,env(safe-area-inset-bottom)) max(8px,env(safe-area-inset-left));user-select:none;-webkit-user-select:none}canvas{width:min(calc(100vw - 16px),calc((100vh - 16px)*.65625),420px);aspect-ratio:420/640;height:auto;background:#f8f2df;box-shadow:0 18px 48px rgba(72,48,18,.22);border-radius:8px;touch-action:none;display:block;max-width:100%;max-height:100%}@supports(height:100dvh){canvas{width:min(calc(100vw - 16px),calc((100dvh - 16px)*.65625),420px)}}@media(max-width:480px){body{padding:max(4px,env(safe-area-inset-top)) max(4px,env(safe-area-inset-right)) max(4px,env(safe-area-inset-bottom)) max(4px,env(safe-area-inset-left))}canvas{border-radius:0;box-shadow:0 10px 28px rgba(72,48,18,.18);width:min(calc(100vw - 8px),calc((100vh - 8px)*.65625))}}@media(max-width:480px) and (orientation:portrait){canvas{width:min(calc(100vw - 8px),calc((100dvh - 8px)*.65625))}}
</style>
</head>
<body>
<canvas id="game" width="420" height="640"></canvas>
<script>
const canvas=document.getElementById("game"),ctx=canvas.getContext("2d");
const WIDTH=420,HEIGHT=640,TOP_BAR=70,WALL=24,FLOOR=HEIGHT-34,SPAWN_Y=TOP_BAR+30,GRAVITY=.32,FRICTION=.992,BOUNCE=.22,DROP_COOLDOWN=26,MERGE_COOLDOWN=12,GAME_OVER_LINE=TOP_BAR+16,GAME_OVER_HOLD_FRAMES=90;
const fruits=[["葡萄",13,"#8f5cf7"],["樱桃",17,"#e8456a"],["橘子",22,"#ff9f1c"],["柠檬",27,"#f7d84b"],["猕猴桃",32,"#77b255"],["番茄",39,"#e6533c"],["桃子",47,"#ffb0a7"],["菠萝",56,"#f3c743"],["椰子",67,"#a86f3d"],["哈密瓜",80,"#87c56a"],["大西瓜",96,"#35a852"]];
let pieces=[],score=0,best=Number(localStorage.getItem("watermelonBest")||0),mouseX=WIDTH/2,currentLevel=rollLevel(),nextLevel=rollLevel(),dropTimer=0,gameOver=false,gameOverTimer=0,frame=0,pixelRatio=1;
function resizeCanvas(){pixelRatio=Math.max(1,Math.min(window.devicePixelRatio||1,3));canvas.width=Math.round(WIDTH*pixelRatio);canvas.height=Math.round(HEIGHT*pixelRatio);ctx.setTransform(pixelRatio,0,0,pixelRatio,0,0)}
function rollLevel(){const r=Math.random()*100;return r<45?0:r<75?1:r<93?2:3}
function clamp(v,min,max){return Math.max(min,Math.min(max,v))}
function clampAim(x,level=currentLevel){const r=fruits[level][1];return clamp(x,WALL+r,WIDTH-WALL-r)}
function canvasX(e){const rect=canvas.getBoundingClientRect();return(e.clientX-rect.left)*WIDTH/rect.width}
function dropFruit(){if(gameOver){restart();return}if(dropTimer>0)return;const r=fruits[currentLevel][1];pieces.push({level:currentLevel,x:clamp(mouseX,WALL+r,WIDTH-WALL-r),y:SPAWN_Y,vx:Math.random()*.7-.35,vy:0,cooldown:0});currentLevel=nextLevel;nextLevel=rollLevel();dropTimer=DROP_COOLDOWN}
function restart(){best=Math.max(best,score);localStorage.setItem("watermelonBest",String(best));pieces=[];score=0;gameOver=false;gameOverTimer=0;dropTimer=0;currentLevel=rollLevel();nextLevel=rollLevel();frame=0}
function resolveWalls(p){const r=fruits[p.level][1];if(p.x-r<WALL){p.x=WALL+r;p.vx=Math.abs(p.vx)*BOUNCE}if(p.x+r>WIDTH-WALL){p.x=WIDTH-WALL-r;p.vx=-Math.abs(p.vx)*BOUNCE}if(p.y+r>FLOOR){p.y=FLOOR-r;p.vy=-Math.abs(p.vy)*BOUNCE;p.vx*=.94}}
function stepPhysics(){if(dropTimer>0)dropTimer--;for(const p of pieces){if(p.cooldown>0)p.cooldown--;p.vy+=GRAVITY;p.vx*=FRICTION;p.vy*=FRICTION;p.x+=p.vx;p.y+=p.vy;resolveWalls(p)}for(let k=0;k<4;k++)resolveCollisions()}
function resolveCollisions(){const merged=new Set(),additions=[];for(let i=0;i<pieces.length;i++){if(merged.has(i))continue;const a=pieces[i];for(let j=i+1;j<pieces.length;j++){if(merged.has(j))continue;const b=pieces[j],dx=b.x-a.x,dy=b.y-a.y,dist=Math.hypot(dx,dy)||.001,minDist=fruits[a.level][1]+fruits[b.level][1];if(dist>=minDist)continue;if(a.level===b.level&&a.level<fruits.length-1&&a.cooldown===0&&b.cooldown===0){additions.push({level:a.level+1,x:(a.x+b.x)/2,y:(a.y+b.y)/2,vx:(a.vx+b.vx)*.35,vy:(a.vy+b.vy)*.35-1.2,cooldown:MERGE_COOLDOWN});merged.add(i);merged.add(j);score+=(a.level+1)*12;break}const overlap=minDist-dist,nx=dx/dist,ny=dy/dist,total=fruits[a.level][1]+fruits[b.level][1],aShare=fruits[b.level][1]/total,bShare=fruits[a.level][1]/total;a.x-=nx*overlap*aShare;a.y-=ny*overlap*aShare;b.x+=nx*overlap*bShare;b.y+=ny*overlap*bShare;const relative=(b.vx-a.vx)*nx+(b.vy-a.vy)*ny;if(relative<0){const impulse=-relative*.42;a.vx-=impulse*nx*aShare;a.vy-=impulse*ny*aShare;b.vx+=impulse*nx*bShare;b.vy+=impulse*ny*bShare}resolveWalls(a);resolveWalls(b)}}if(merged.size>0){pieces=pieces.filter((_,i)=>!merged.has(i));pieces.push(...additions)}}
function checkGameOver(){if(frame<120)return;const overLine=pieces.some(p=>p.y-fruits[p.level][1]<GAME_OVER_LINE&&Math.abs(p.vy)<4);if(overLine)gameOverTimer++;else gameOverTimer=0;if(gameOverTimer>=GAME_OVER_HOLD_FRAMES){best=Math.max(best,score);localStorage.setItem("watermelonBest",String(best));gameOver=true}}
function drawFruit(x,y,level,scale=1,ghost=false){const [name,radius,color]=fruits[level],r=radius*scale;ctx.save();ctx.globalAlpha=ghost?.52:1;ctx.fillStyle=color;ctx.strokeStyle=ghost?"#c4a57a":"#9c8057";ctx.lineWidth=ghost?1:2;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.globalAlpha=ghost?.25:.42;ctx.fillStyle="#fff";ctx.beginPath();ctx.ellipse(x-r*.25,y-r*.35,r*.22,r*.14,-.75,0,Math.PI*2);ctx.fill();ctx.globalAlpha=ghost?.52:1;if(level===fruits.length-1){ctx.strokeStyle="#1f7a3f";ctx.lineWidth=3*scale;for(const offset of[-.45,-.15,.15,.45]){ctx.beginPath();ctx.ellipse(x+r*offset,y,r*.18,r*.78,0,-Math.PI/2,Math.PI/2);ctx.stroke()}}if(r>=24){ctx.fillStyle="#3b342c";ctx.font=`bold ${Math.max(8,Math.floor(r/2.9))}px Microsoft YaHei,sans-serif`;ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(name,x,y+1)}ctx.restore()}
function draw(){ctx.setTransform(pixelRatio,0,0,pixelRatio,0,0);ctx.fillStyle="#f8f2df";ctx.fillRect(0,0,WIDTH,HEIGHT);ctx.fillStyle="#fff9ea";ctx.strokeStyle="#d4b77d";ctx.lineWidth=3;ctx.fillRect(WALL,TOP_BAR,WIDTH-WALL*2,FLOOR-TOP_BAR);ctx.strokeRect(WALL,TOP_BAR,WIDTH-WALL*2,FLOOR-TOP_BAR);ctx.fillStyle="#cf9f5d";ctx.fillRect(WALL,FLOOR,WIDTH-WALL*2,HEIGHT-FLOOR);ctx.setLineDash([5,7]);ctx.strokeStyle="#e89191";ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(WALL,GAME_OVER_LINE);ctx.lineTo(WIDTH-WALL,GAME_OVER_LINE);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle="#3b342c";ctx.font="bold 18px Microsoft YaHei,sans-serif";ctx.textAlign="left";ctx.fillText("合成大西瓜",22,26);ctx.font="11px Microsoft YaHei,sans-serif";ctx.fillStyle="#5d5144";ctx.fillText(`分数 ${score}   最高 ${best}`,22,50);ctx.fillText("下一个",330,20);drawFruit(382,36,nextLevel,.72);if(!gameOver){const x=clampAim(mouseX);ctx.setLineDash([3,8]);ctx.strokeStyle="#dfcda7";ctx.beginPath();ctx.moveTo(x,GAME_OVER_LINE);ctx.lineTo(x,FLOOR);ctx.stroke();ctx.setLineDash([]);drawFruit(x,SPAWN_Y,currentLevel,.92,true)}[...pieces].sort((a,b)=>fruits[a.level][1]-fruits[b.level][1]).forEach(p=>drawFruit(p.x,p.y,p.level));if(gameOver){ctx.fillStyle="#fff7df";ctx.strokeStyle="#a97d4e";ctx.lineWidth=3;ctx.fillRect(64,236,WIDTH-128,158);ctx.strokeRect(64,236,WIDTH-128,158);ctx.fillStyle="#3b342c";ctx.textAlign="center";ctx.font="bold 25px Microsoft YaHei,sans-serif";ctx.fillText("游戏结束",WIDTH/2,288);ctx.font="14px Microsoft YaHei,sans-serif";ctx.fillStyle="#5d5144";ctx.fillText(`本局分数：${score}`,WIDTH/2,326);ctx.font="12px Microsoft YaHei,sans-serif";ctx.fillStyle="#8b4f36";ctx.fillText("按 R 或点击重新开始",WIDTH/2,360)}}
function loop(){if(!gameOver){stepPhysics();checkGameOver()}draw();frame++;requestAnimationFrame(loop)}
canvas.addEventListener("pointermove",e=>{e.preventDefault();mouseX=clampAim(canvasX(e))});canvas.addEventListener("pointerdown",e=>{e.preventDefault();canvas.setPointerCapture?.(e.pointerId);mouseX=clampAim(canvasX(e));dropFruit()});canvas.addEventListener("pointerup",e=>{e.preventDefault();canvas.releasePointerCapture?.(e.pointerId)});canvas.addEventListener("pointercancel",e=>canvas.releasePointerCapture?.(e.pointerId));window.addEventListener("keydown",e=>{if(e.code==="Space"){e.preventDefault();dropFruit()}if(e.key==="r"||e.key==="R")restart();if(e.key==="ArrowLeft")mouseX=clampAim(mouseX-22);if(e.key==="ArrowRight")mouseX=clampAim(mouseX+22)});window.addEventListener("resize",resizeCanvas);window.addEventListener("orientationchange",resizeCanvas);document.addEventListener("gesturestart",e=>e.preventDefault());resizeCanvas();loop();
</script>
</body>
</html>
